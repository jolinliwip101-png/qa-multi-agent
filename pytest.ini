[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --alluredir=allure-results
markers =
    ui: UI smoke tests
    api: API smoke tests
    smoke: Smoke test suite
    slow: Slow-running tests
asyncio_mode = auto
